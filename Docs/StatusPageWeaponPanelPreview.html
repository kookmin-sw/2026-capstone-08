<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Status Page Weapon Panel Preview</title>
  <style>
    :root {
      color-scheme: dark;
      --fg: rgba(255, 255, 255, 0.94);
      --muted: rgba(255, 255, 255, 0.52);
      --dim: rgba(255, 255, 255, 0.34);
      --panel: rgba(11, 11, 13, 0.54);
      --panel-deep: rgba(4, 4, 5, 0.68);
      --row: rgba(255, 255, 255, 0.035);
      --line: rgba(255, 255, 255, 0.12);
      --rare: #7bb7ff;
      --steel: #bfc7d4;
      --iron: #6e7682;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      background: #151516;
      color: var(--fg);
      font-family: "Inter", "Segoe UI", Arial, sans-serif;
      letter-spacing: 0;
    }

    body {
      display: grid;
      place-items: center;
      padding: 18px;
    }

    .stage {
      position: relative;
      width: min(100vw - 36px, 1600px);
      aspect-ratio: 16 / 9;
      overflow: hidden;
      background:
        linear-gradient(90deg, rgba(0, 0, 0, 0.56), rgba(0, 0, 0, 0.14) 45%, rgba(0, 0, 0, 0.62)),
        linear-gradient(180deg, rgba(19, 19, 20, 0.74), rgba(10, 10, 11, 0.9));
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.52);
    }

    .world {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 36% 75%, rgba(255, 255, 255, 0.05) 0 2px, transparent 3px),
        linear-gradient(110deg, transparent 0 45%, rgba(255, 255, 255, 0.05) 45.2% 45.6%, transparent 46%),
        repeating-linear-gradient(0deg, rgba(255, 255, 255, 0.035) 0 2px, transparent 2px 72px),
        repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.035) 0 2px, transparent 2px 72px);
      transform: perspective(900px) rotateX(58deg) translateY(-27%);
      transform-origin: 50% 0;
      opacity: 0.9;
    }

    .shade {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, rgba(0, 0, 0, 0.28) 0 36%, transparent 36% 64%, rgba(0, 0, 0, 0.42) 64%),
        linear-gradient(180deg, transparent 0 50%, rgba(0, 0, 0, 0.34));
      pointer-events: none;
    }

    .inventory {
      position: absolute;
      inset: 54px 54px 70px;
      display: grid;
      /*
        Layout constraints for UMG implementation:
        - Left status panel: fixed 500px.
        - Center spacer: fill/stretch.
        - Right weapon panel: fixed 430px.
        - Weapon preview image uses a widget-owned square high-resolution render target and must remain clipped inside its preview frame.
        - Final weapon preview should use a Status-specific transparent-background UI material path, not direct RT display.
        - A visible black render-target rectangle is not part of the final visual target.
        - The Status widget spawns its preview actor offscreen; level-placed preview actors must not drive this panel.
        - Detailed weapon preview ownership and bounds-fitting rules are documented in StatusWeaponPreviewImplementationPlan.md.
        - Do not add weapon description or Expected Damage rows in this pass.
      */
      grid-template-columns: 500px minmax(220px, 1fr) 430px;
      gap: 26px;
      background: linear-gradient(90deg, rgba(0, 0, 0, 0.18), rgba(0, 0, 0, 0.08), rgba(0, 0, 0, 0.2));
      border-left: 1px solid rgba(255, 255, 255, 0.04);
      border-right: 1px solid rgba(255, 255, 255, 0.04);
    }

    .left-panel,
    .right-panel {
      min-width: 0;
      background: var(--panel);
      border: 1px solid rgba(255, 255, 255, 0.06);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.025);
    }

    .left-panel {
      padding: 26px 28px;
    }

    .section {
      display: grid;
      gap: 5px;
      margin-bottom: 28px;
    }

    .section.secondary {
      margin-top: 12px;
    }

    .stat-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) max-content;
      align-items: center;
      min-height: 32px;
      gap: 18px;
      color: var(--fg);
      font-size: 24px;
      font-weight: 700;
      line-height: 1.05;
    }

    .stat-row.blank {
      min-height: 30px;
      opacity: 0;
    }

    .stat-row span:first-child {
      color: rgba(255, 255, 255, 0.78);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .stat-row span:last-child {
      color: rgba(255, 255, 255, 0.98);
      text-align: right;
      white-space: nowrap;
    }

    .spacer {
      min-width: 0;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.025), transparent 42%),
        linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.025), transparent);
    }

    .right-panel {
      padding: 22px 24px 24px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .weapon-preview {
      position: relative;
      height: 300px;
      overflow: hidden;
      background:
        radial-gradient(circle at 52% 45%, rgba(123, 183, 255, 0.13), transparent 36%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.055), rgba(255, 255, 255, 0.02));
      border: 1px solid var(--line);
    }

    .preview-floor {
      position: absolute;
      left: 26px;
      right: 26px;
      bottom: 22px;
      height: 34px;
      background: radial-gradient(ellipse at center, rgba(0, 0, 0, 0.55), transparent 70%);
      transform: skewX(-18deg);
    }

    .weapon-model {
      position: absolute;
      left: 50%;
      top: 48%;
      width: 74px;
      height: 246px;
      transform: translate(-50%, -50%) rotate(42deg);
      transform-origin: 50% 58%;
      filter: drop-shadow(0 18px 15px rgba(0, 0, 0, 0.6));
    }

    .blade {
      position: absolute;
      left: 30px;
      top: 0;
      width: 14px;
      height: 164px;
      background:
        linear-gradient(90deg, #737b86 0 18%, #e4e8ee 46%, #7f8792 100%);
      clip-path: polygon(50% 0, 100% 18%, 78% 100%, 22% 100%, 0 18%);
    }

    .blade::after {
      content: "";
      position: absolute;
      left: 6px;
      top: 12px;
      width: 2px;
      height: 132px;
      background: rgba(255, 255, 255, 0.58);
    }

    .guard {
      position: absolute;
      left: 0;
      top: 154px;
      width: 74px;
      height: 16px;
      background: linear-gradient(90deg, #25282d, #9da5b1 48%, #25282d);
      border: 1px solid rgba(255, 255, 255, 0.22);
    }

    .grip {
      position: absolute;
      left: 27px;
      top: 170px;
      width: 20px;
      height: 58px;
      background: linear-gradient(90deg, #101113, #3c4148, #111215);
      border-left: 1px solid rgba(255, 255, 255, 0.12);
      border-right: 1px solid rgba(255, 255, 255, 0.12);
    }

    .pommel {
      position: absolute;
      left: 22px;
      top: 226px;
      width: 30px;
      height: 20px;
      background: linear-gradient(90deg, #191b1f, #a8b0bd, #191b1f);
      border-radius: 1px;
    }

    .weapon-header {
      display: grid;
      gap: 5px;
    }

    .weapon-name {
      margin: 0;
      color: var(--fg);
      font-size: 28px;
      font-weight: 800;
      line-height: 1.02;
    }

    .weapon-grade {
      color: var(--rare);
      font-size: 18px;
      font-weight: 800;
      line-height: 1;
    }

    .block {
      display: grid;
      gap: 7px;
    }

    .block-title {
      margin: 0;
      color: rgba(255, 255, 255, 0.72);
      font-size: 14px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .weapon-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) max-content;
      align-items: center;
      min-height: 27px;
      gap: 14px;
      padding: 3px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.055);
      color: var(--fg);
      font-size: 18px;
      font-weight: 700;
      line-height: 1.1;
    }

    .weapon-row span:first-child {
      color: rgba(255, 255, 255, 0.62);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .weapon-row span:last-child {
      color: rgba(255, 255, 255, 0.94);
      text-align: right;
      white-space: nowrap;
    }

    .scale-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .scale {
      display: grid;
      place-items: center;
      min-height: 44px;
      background: rgba(255, 255, 255, 0.045);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .scale small {
      color: var(--dim);
      font-size: 12px;
      font-weight: 800;
      line-height: 1;
    }

    .scale strong {
      margin-top: 4px;
      color: var(--fg);
      font-size: 22px;
      line-height: 1;
    }

    @media (max-width: 900px) {
      body {
        padding: 8px;
      }

      .stage {
        width: calc(100vw - 16px);
      }

      .inventory {
        inset: 28px 24px 36px;
        grid-template-columns: minmax(220px, 40%) minmax(80px, 1fr) minmax(180px, 32%);
        gap: 14px;
      }

      .left-panel {
        padding: 16px;
      }

      .right-panel {
        padding: 14px;
        gap: 10px;
      }

      .stat-row {
        min-height: 24px;
        font-size: 16px;
        gap: 10px;
      }

      .weapon-preview {
        height: 118px;
      }

      .weapon-name {
        font-size: 20px;
      }

      .weapon-grade {
        font-size: 14px;
      }

      .block-title {
        font-size: 11px;
      }

      .weapon-row {
        min-height: 21px;
        font-size: 13px;
      }

      .scale {
        min-height: 34px;
      }

      .scale strong {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <main class="stage" aria-label="Status page weapon panel preview">
    <div class="world" aria-hidden="true"></div>
    <div class="shade" aria-hidden="true"></div>

    <section class="inventory" aria-label="Status inventory page">
      <aside class="left-panel" aria-label="Player status">
        <div class="section">
          <div class="stat-row"><span>HP</span><span>120 / 120</span></div>
          <div class="stat-row"><span>Stamina</span><span>86 / 100</span></div>
          <div class="stat-row"><span>Mana</span><span>42 / 60</span></div>
        </div>

        <div class="section secondary">
          <div class="stat-row blank"><span>Blank</span><span>0</span></div>
          <div class="stat-row"><span>Stamina Regen</span><span>3.5</span></div>
          <div class="stat-row"><span>Mana Regen</span><span>1.8</span></div>
          <div class="stat-row"><span>Strength</span><span>28</span></div>
          <div class="stat-row"><span>Dexterity</span><span>18</span></div>
          <div class="stat-row"><span>Intelligence</span><span>7</span></div>
        </div>
      </aside>

      <div class="spacer" aria-hidden="true"></div>

      <aside class="right-panel" aria-label="Equipped weapon">
        <div class="weapon-preview" aria-label="Weapon preview">
          <div class="preview-floor" aria-hidden="true"></div>
          <div class="weapon-model" aria-hidden="true">
            <div class="blade"></div>
            <div class="guard"></div>
            <div class="grip"></div>
            <div class="pommel"></div>
          </div>
        </div>

        <header class="weapon-header">
          <h1 class="weapon-name">Dark Iron Sword</h1>
          <div class="weapon-grade">Rare</div>
        </header>

        <section class="block" aria-label="Base specs">
          <h2 class="block-title">Base Specs</h2>
          <div class="weapon-row"><span>Weapon Damage</span><span>42</span></div>
          <div class="weapon-row"><span>Poise Damage</span><span>18</span></div>
        </section>

        <section class="block" aria-label="Scaling">
          <h2 class="block-title">Scaling</h2>
          <div class="scale-grid">
            <div class="scale"><small>STR</small><strong>B</strong></div>
            <div class="scale"><small>DEX</small><strong>C</strong></div>
            <div class="scale"><small>INT</small><strong>F</strong></div>
          </div>
        </section>

      </aside>
    </section>
  </main>
</body>
</html>
